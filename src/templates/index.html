<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bun + htmx Starter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body style="font-family: sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto;">
  <main>
    <h1>My Todo List</h1>

    <form hx-post="/todos" 
          hx-target="#todo-list" 
          hx-swap="innerHTML" 
          ononsubmit="this.reset()">
      <input name="text" 
             placeholder="What needs to be done?" 
             style="padding: 0.5rem; width: 70%;"
             autocomplete="off" 
             required>
      <button type="submit" style="padding: 0.5rem;">Add Todo</button>
    </form>

    <ul id="todo-list" style="margin-top: 2rem;">
      <!-- SLOT: TODO_ITEMS -->
    </ul>
  </main>
</body>
</html>
